name: Build NavTree

on:
  push:
    branches: [main]
    paths:
      - "wiki-llm/wiki/**/*.md"
      - "wiki-llm/.navtree/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build NavTree v2
        working-directory: wiki-llm/.navtree
        run: python build_navtree.py

      - name: Commit output and archive changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wiki-llm/.navtree/output/
          git add wiki-llm/vault-changelog.archive.toml || true
          if [ -f wiki-llm/vault-changelog.toml ]; then
            git rm wiki-llm/vault-changelog.toml || true
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update navtree output"
            git push
          fi
